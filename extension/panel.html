<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Raku</title>
        <link rel="stylesheet" href="panel.css" />
    </head>
    <body>
        <header class="hdr">
            <div class="light" aria-hidden>
                <span></span><span></span><span></span><span></span
                ><span></span><span></span><span></span><span></span
                ><span></span>
            </div>
            <div>
                <div class="eyebrow">raku · side panel</div>
                <div class="title">what now?</div>
            </div>
        </header>

        <section id="today" class="card">
            <div class="eyebrow">today</div>
            <ol id="today-list" class="tasks"></ol>
            <button id="refresh" class="btn ghost">refresh</button>
        </section>

        <section id="scan" class="card">
            <div class="eyebrow">brightspace scan</div>
            <div id="scan-msg" class="sub">open a course page to scan for assignments.</div>
            <ul id="scan-list" class="tasks small"></ul>
            <div class="row">
                <button id="scan-btn" class="btn">scan this page</button>
                <button id="add-btn" class="btn primary" disabled>add all</button>
            </div>
        </section>

        <section class="card">
            <div class="eyebrow">settings</div>
            <label class="field">
                <span>backend URL</span>
                <input id="api-url" type="text" />
            </label>
            <button id="save-url" class="btn ghost">save</button>
        </section>

        <script src="panel.js"></script>
    </body>
</html>
