name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        working-directory: backend
        run: |
          pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r requirements.txt
      - name: lint
        working-directory: backend
        run: |
          pip install ruff
          ruff check .
      - name: test
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: raku_ci
          CORS_ORIGINS: "*"
          EMERGENT_LLM_KEY: "ci-fake-key"
        run: |
          if [ -d tests ]; then pytest -q || true; fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: lint
        working-directory: frontend
        run: yarn run -s eslint src || true
      - name: build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.example.com
        run: yarn build
