<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Raku Capture — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main class="wrap">
    <header class="head">
      <span class="dot"></span>
      <h1>Raku Capture settings</h1>
    </header>

    <section class="card">
      <label class="field">
        <span class="label">Backend URL</span>
        <input id="baseUrl" class="input" type="url" placeholder="https://your-raku.vercel.app" />
        <span class="hint">Your Raku app's base URL. Leave blank to use the default.</span>
      </label>

      <div class="row">
        <button id="save" class="btn btn-primary">Save</button>
        <button id="reset" class="btn btn-ghost">Reset to default</button>
      </div>
      <div id="msg" class="msg" role="status" aria-live="polite"></div>
    </section>

    <p class="foot">v0.1.0</p>
  </main>
  <script src="options.js" type="module"></script>
</body>
</html>
