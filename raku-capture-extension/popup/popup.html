<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kumo Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="dot"></span>
      <span class="name">Kumo Capture</span>
    </div>

    <p class="lede">
      A tiny K cloud lives in the bottom-right of every page.
      Click it to explain what's on screen, or send it to Kumo to organize.
    </p>

    <div class="card">
      <div class="eyebrow">Status</div>
      <div id="status" class="status">checking…</div>
    </div>

    <div class="actions">
      <button id="openOptions" class="btn">Change backend URL</button>
      <a id="openApp" class="btn btn-ghost" href="#" target="_blank" rel="noreferrer">Open Kumo app</a>
    </div>

    <p class="foot">v0.1.0 · no tracking · no background snooping</p>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
